name: UI Tests

on:
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    env:
      UI_BASE_URL: ${{ vars.UI_BASE_URL || secrets.UI_BASE_URL }}
      UI_USERNAME: ${{ secrets.UI_USERNAME }}
      UI_PASSWORD: ${{ secrets.UI_PASSWORD }}
      API_BASE_URL: ${{ vars.API_BASE_URL || secrets.API_BASE_URL }}
      AUTH_HEADER: ${{ secrets.AUTH_HEADER }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Validate UI test environment
        run: |
          if [ -z "$UI_BASE_URL" ]; then
            echo "::error::UI_BASE_URL is required. Add it as a repository variable or secret."
            exit 1
          fi
          if [ -z "$UI_USERNAME" ]; then
            echo "::error::UI_USERNAME is required. Add it as a repository secret."
            exit 1
          fi
          if [ -z "$UI_PASSWORD" ]; then
            echo "::error::UI_PASSWORD is required. Add it as a repository secret."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps
        
      - name: Connect WireGuard VPN
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools resolvconf
          echo "${{ secrets.WG_CONFIG_B64 }}" | base64 -d | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sudo wg show
          curl -I "$UI_BASE_URL/login"
          
      - name: Run UI tests
        run: npm run test:ui
