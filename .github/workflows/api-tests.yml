name: API Tests

on:
  workflow_dispatch:

jobs:
  pytest-api:
    name: Run pytest API tests
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://data-api.solar-twin.dev
      AUTH_HEADER: ${{ secrets.SOLAR_TWIN_AUTH_HEADER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Show files
        run: find . -maxdepth 4 -type f | sort

      - name: Run pytest API tests
        run: pytest -v tests
